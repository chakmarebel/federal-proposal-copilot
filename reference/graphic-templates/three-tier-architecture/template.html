<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{title}}</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:{{theme.bg}};font-family:'Segoe UI',system-ui,sans-serif;
       display:flex;justify-content:center;align-items:center;
       min-height:100vh;padding:20px}
  .canvas{width:1200px;background:{{theme.bg}};border-radius:12px;
          overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="canvas">
  <div style="padding:18px 32px 8px;text-align:center;border-bottom:2px solid {{theme.accent}}">
    <h1 style="color:{{theme.text}};font-size:28px;font-weight:700;letter-spacing:.5px;text-transform:uppercase">{{title}}</h1>
    <p style="color:{{theme.muted}};font-size:15px;margin-top:4px">{{subtitle}}</p>
  </div>

  <svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" style="display:block">
    <defs>
      <marker id="ad" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0,10 3.5,0 7" fill="{{theme.text}}"/>
      </marker>
      <marker id="au" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0,10 3.5,0 7" fill="{{theme.accent}}"/>
      </marker>
    </defs>

    <!-- ===== TOP TIER ===== -->
    <rect x="60" y="22" width="1080" height="118" rx="10" fill="{{theme.panel}}" stroke="{{theme.panel_border}}" stroke-width="1.5"/>
    <text x="600" y="54" fill="{{theme.text}}" font-size="22" font-weight="700" font-family="Segoe UI" text-anchor="middle" letter-spacing=".5">{{tiers.0.name}}</text>
    <text x="600" y="76" fill="{{theme.muted}}" font-size="15" font-family="Segoe UI" text-anchor="middle">{{tiers.0.subtitle}}</text>

    <line x1="330" y1="86" x2="330" y2="126" stroke="{{theme.panel_border}}" stroke-width="1" opacity=".5"/>
    <line x1="600" y1="86" x2="600" y2="126" stroke="{{theme.panel_border}}" stroke-width="1" opacity=".5"/>
    <line x1="870" y1="86" x2="870" y2="126" stroke="{{theme.panel_border}}" stroke-width="1" opacity=".5"/>
    <text x="195" y="106" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.0.components.0}}</text>
    <text x="465" y="106" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.0.components.1}}</text>
    <text x="735" y="106" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.0.components.2}}</text>
    <text x="1005" y="106" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.0.components.3}}</text>

    <rect x="430" y="124" width="340" height="28" rx="14" fill="{{theme.accent}}"/>
    <text x="600" y="143" fill="{{theme.bg}}" font-size="15" font-weight="700" font-family="Segoe UI" text-anchor="middle">{{tiers.0.pill}}</text>

    <!-- Arrows top → middle (boundary 0) -->
    <line x1="430" y1="158" x2="430" y2="200" stroke="{{theme.text}}" stroke-width="2" marker-end="url(#ad)"/>
    <line x1="770" y1="200" x2="770" y2="158" stroke="{{theme.accent}}" stroke-width="2" marker-end="url(#au)"/>
    <text x="444" y="170" fill="#c8c8c8" font-size="13" font-weight="600" font-family="Segoe UI">{{boundaries.0.down_arrow_label}}</text>
    <text x="756" y="170" fill="{{theme.accent}}" font-size="13" font-weight="600" font-family="Segoe UI" text-anchor="end">{{boundaries.0.up_arrow_label}}</text>

    <line x1="100" y1="183" x2="1100" y2="183" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="525" y="174" width="150" height="18" rx="9" fill="#222528" stroke="#4a4a4a" stroke-width="1"/>
    <text x="600" y="187" fill="{{theme.text}}" font-size="11" font-weight="700" font-family="Segoe UI" text-anchor="middle" letter-spacing=".5">{{boundaries.0.label}}</text>

    <!-- ===== MIDDLE TIER ===== -->
    <rect x="60" y="207" width="1080" height="118" rx="10" fill="{{theme.panel}}" stroke="{{theme.panel_border}}" stroke-width="1.5"/>
    <text x="600" y="239" fill="{{theme.text}}" font-size="22" font-weight="700" font-family="Segoe UI" text-anchor="middle" letter-spacing=".5">{{tiers.1.name}}</text>
    <text x="600" y="261" fill="{{theme.muted}}" font-size="15" font-family="Segoe UI" text-anchor="middle">{{tiers.1.subtitle}}</text>

    <line x1="330" y1="271" x2="330" y2="311" stroke="{{theme.panel_border}}" stroke-width="1" opacity=".5"/>
    <line x1="600" y1="271" x2="600" y2="311" stroke="{{theme.panel_border}}" stroke-width="1" opacity=".5"/>
    <line x1="870" y1="271" x2="870" y2="311" stroke="{{theme.panel_border}}" stroke-width="1" opacity=".5"/>
    <text x="195" y="291" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.1.components.0}}</text>
    <text x="465" y="291" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.1.components.1}}</text>
    <text x="735" y="291" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.1.components.2}}</text>
    <text x="1005" y="291" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.1.components.3}}</text>

    <rect x="430" y="309" width="340" height="28" rx="14" fill="{{theme.accent}}"/>
    <text x="600" y="328" fill="{{theme.bg}}" font-size="15" font-weight="700" font-family="Segoe UI" text-anchor="middle">{{tiers.1.pill}}</text>

    <!-- Arrows middle → bottom (boundary 1) -->
    <line x1="430" y1="343" x2="430" y2="385" stroke="{{theme.text}}" stroke-width="2" marker-end="url(#ad)"/>
    <line x1="770" y1="385" x2="770" y2="343" stroke="{{theme.accent}}" stroke-width="2" marker-end="url(#au)"/>
    <text x="444" y="355" fill="#c8c8c8" font-size="13" font-weight="600" font-family="Segoe UI">{{boundaries.1.down_arrow_label}}</text>
    <text x="756" y="355" fill="{{theme.accent}}" font-size="13" font-weight="600" font-family="Segoe UI" text-anchor="end">{{boundaries.1.up_arrow_label}}</text>

    <line x1="100" y1="368" x2="1100" y2="368" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="525" y="359" width="150" height="18" rx="9" fill="#222528" stroke="#4a4a4a" stroke-width="1"/>
    <text x="600" y="372" fill="{{theme.text}}" font-size="11" font-weight="700" font-family="Segoe UI" text-anchor="middle" letter-spacing=".5">{{boundaries.1.label}}</text>

    <!-- ===== BOTTOM TIER (accented) ===== -->
    <rect x="60" y="392" width="1080" height="118" rx="10" fill="rgba(238,41,41,.08)" stroke="{{theme.accent}}" stroke-width="2"/>
    <text x="600" y="424" fill="{{theme.accent}}" font-size="22" font-weight="700" font-family="Segoe UI" text-anchor="middle" letter-spacing=".5">{{tiers.2.name}}</text>
    <text x="600" y="446" fill="#c8c8c8" font-size="15" font-family="Segoe UI" text-anchor="middle">{{tiers.2.subtitle}}</text>

    <line x1="330" y1="456" x2="330" y2="496" stroke="{{theme.accent}}" stroke-width="1" opacity=".4"/>
    <line x1="600" y1="456" x2="600" y2="496" stroke="{{theme.accent}}" stroke-width="1" opacity=".4"/>
    <line x1="870" y1="456" x2="870" y2="496" stroke="{{theme.accent}}" stroke-width="1" opacity=".4"/>
    <text x="195" y="476" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.2.components.0}}</text>
    <text x="465" y="476" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.2.components.1}}</text>
    <text x="735" y="476" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.2.components.2}}</text>
    <text x="1005" y="476" fill="{{theme.text}}" font-size="17" font-family="Segoe UI" text-anchor="middle">{{tiers.2.components.3}}</text>

    <rect x="430" y="500" width="340" height="28" rx="14" fill="rgba(238,41,41,.15)" stroke="{{theme.accent}}" stroke-width="1.5"/>
    <text x="600" y="519" fill="{{theme.accent}}" font-size="15" font-weight="700" font-family="Segoe UI" text-anchor="middle">{{tiers.2.pill}}</text>

  </svg>

  <div style="background:#111315;padding:10px 32px;display:flex;justify-content:space-between;align-items:center">
    <span style="color:{{theme.accent}};font-size:13px;font-weight:700;opacity:.8;letter-spacing:.5px">{{footer.brand}}</span>
    <span style="color:{{theme.muted}};font-size:12px">{{footer.tagline}}</span>
    <span style="color:{{theme.muted}};font-size:12px">{{footer.website}}</span>
  </div>

</div>
</body>
</html>
