<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Where Edge AI Fits — The Three-Tier AI Ecosystem</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#191c20;font-family:'Segoe UI',system-ui,sans-serif;
       display:flex;justify-content:center;align-items:center;
       min-height:100vh;padding:20px}
  .canvas{width:1200px;background:#191c20;border-radius:12px;
          overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="canvas">

    <text x="600" y="76" fill="#9f9f9f" font-size="15" font-family="Segoe UI" text-anchor="middle">HQ · National Labs · Cloud Infrastructure · Policy Bodies</text>

    <text x="1005" y="106" fill="#ffffff" font-size="17" font-family="Segoe UI" text-anchor="middle">Policy & Standards</text>

    <text x="756" y="355" fill="#ee2929" font-size="13" font-weight="600" font-family="Segoe UI" text-anchor="end">Store & Forward</text>

    <rect x="525" y="359" width="150" height="18" rx="9" fill="#222528" stroke="#4a4a4a" stroke-width="1"/>
    <text x="600" y="372" fill="#ffffff" font-size="11" font-weight="700" font-family="Segoe UI" text-anchor="middle" letter-spacing=".5">DDIL BOUNDARY</text>

    <text x="600" y="519" fill="#ee2929" font-size="15" font-weight="700" font-family="Segoe UI" text-anchor="middle">NO CLOUD DEPENDENCY · NO DATA EGRESS</text>

  <div style="background:#111315;padding:10px 32px;display:flex;justify-content:space-between;align-items:center">
    <span style="color:#ee2929;font-size:13px;font-weight:700;opacity:.8;letter-spacing:.5px">EDGE AI</span>
    <span style="color:#9f9f9f;font-size:12px">Edge AI closes the gap between enterprise investment and operational use — in any environment</span>
    <span style="color:#9f9f9f;font-size:12px">example.com</span>
  </div>

</div>
</body>
</html>
